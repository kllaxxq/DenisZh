<!doctype html>
<html>
	<head>
		<meta charset = "utf-8">
		<title>svg</title>
		<style>
			svg {
			  border: 1px solid #dddddd;
			}
		</style>
	</head>
	<body>
	<svg width="360" height="500">
		<rect x="5" y="30" width="320" height="400" fill="lemonchiffon" rx="35" ry="35"/>
		<circle r="90" cx="110" cy="145" fill="crimson"/>
		<polygon points="125,250 95,250 110,230" fill="crimson"/>
		<ellipse rx="55" ry="80" cx="190" cy="175" fill="gold"/>
		<polygon points="205,270 175,270 190,250" fill="gold"/>
		<polyline points="110,250 100,270 110,290 100,310 110,330 100,350 110,370" fill="none" stroke="brown"/>
		<polyline points="190,270 180,290 190,310 180,330 190,350 180,370 190,390" fill="none" stroke="brown"/>
	</svg>
	</body>
</html>
