<!doctype html>
<html>
	<head>
		<meta charset = "utf-8">
		<title>svg</title>
		<style>
			svg {
			  border: 1px solid #dddddd;
			}
		</style>
	</head>
	<body>
	<svg width="300" height="290">
		<rect width="540" height="150" fill="skyblue" />
  		<rect y="150" width="540" height="150" fill="yellowgreen" />
		<rect width="15" height="30" x="200" y="220" rx="10" fill="black" />
	  	<rect width="15" height="30" x="75" y="220" rx="10" fill="black" />

		<circle r="110" cx="150" cy="145" fill="crimson"/>
		<circle r="90" cx="150" cy="145" fill="white"/>
		<circle r="65" cx="150" cy="145" fill="crimson"/>
		<circle r="40" cx="150" cy="145" fill="white"/>
		<circle r="20" cx="150" cy="145" fill="crimson"/>
	</svg>
	</body>
</html>
