<!doctype html>
<html>
	<head>
		<meta charset = "utf-8">
		<title>svg</title>
		<style>
			svg {
			  border: 1px solid #dddddd;
			}
		</style>
	</head>
	<body>
	<svg width="360" height="500">
        <rect x="130" y="180" width="80" height="100" stroke="black" fill="none" />
        <circle cx="130" cy="190" r="4" fill="black" />
        <circle cx="130" cy="210" r="4" fill="black" />
        <circle cx="130" cy="230" r="4" fill="black" />
        <circle cx="130" cy="250" r="4" fill="black" />
        <circle cx="130" cy="270" r="4" fill="black" />
        <line x1="190" y1="180" x2="190" y2="280" stroke="black" stroke-width="1" />
        <rect x="220" y="180" width="10" height="100" stroke="black" fill="none" />
        <polygon points="225,290 220,280 230,280" stroke="black" fill="none"/>
        <polyline points="220,185 215,190 215,200" stroke="black" fill="none"/>
	</svg>
	</body>
</html>
