<!doctype html>
<html>
	<head>
		<meta charset = "utf-8">
		<title>svg</title>
		<style>
			svg {
			  border: 1px solid #dddddd;
			}
		</style>
	</head>
	<body>
		<svg width="550" height="120">
  			<rect x="45" y="20" width="20" height="90" fill="teal" />
  			<rect x="5" y="55" width="100" height="20" fill="teal" />
			<rect x="120" y="55" width="100" height="20" fill="orangered" />
			<rect x="225" y="55" transform="rotate(45,275,65)" width="100" height="20" fill="royalblue" />
			<rect x="225" y="55" transform="rotate(135,275,65)" width="100" height="20" fill="royalblue" />
			<rect x="325" y="55" transform="rotate(135,375,65)" width="100" height="20" fill="purple" />
			<rect x="440" y="40" width="100" height="20" fill="orange" />
			<rect x="440" y="70" width="100" height="20" fill="orange" />
	</svg>
	</body>
</html>
